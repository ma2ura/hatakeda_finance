project:
  type: book
  output-dir: docs

lightbox: auto

book:
  title: "畠田 証券投資論"
  author:
    - name: "Soichi Matsuura"
    - affiliation: Ritsumeikan University
    - email: matsuura@fc.ritsumei.ac.jp
  date: "11/28/2024"
  search: true
  favicon: img/favicon.ico
  cover-image: "img/shoken.jpg"


  reader-mode: true
  google-analytics: "G-SFB56VHK63"
  page-navigation: true

  site-url: https://so-ichi.com
  repo-url: https://github.com/ma2ura/Hatakeda_Finance/
  repo-branch: main

  page-footer:
      border: true
      background: "#a10000"
      left: "Copyright 2026, Soichi Matsuura"
      right:
        - icon: github
          href: https://github.com/ma2ura
        - icon: twitter
          href: https://twitter.com/matsuura_rits
          aria-label: Twitter

  sidebar:
    style: docked
    background: light
    collapse: true

  chapters:
    - index.qmd
    - Hatakeda_Chap02.qmd
    - Hatakeda_Chap03.qmd
    - Hatakeda_Chap04.qmd
    - Hatakeda_Chap05.qmd
    - Hatakeda_Chap06.qmd
    - Hatakeda_Chap07.qmd
    - Hatakeda_Chap08.qmd
    - Hatakeda_Chap09.qmd


website:
  back-to-top-navigation: true

format:
  html:
    theme:
      light: united
      dark: cyborg
    mainfont: "Noto Sans JP"
    monofont: "0xProto" # ※このフォントがシステムにない場合、デフォルトになります

    toc: true
    toc-location: left
    toc-title: "ここの目次"
    toc-depth: 2
    toc-expand: true

    code-tools: true
    code-link: true
    code-line-numbers: true
    code-block-bg: true
    code-block-border-left: "#002D72"
    code-copy: hover
    code-overflow: scroll
    link-external-icon: true


    html-math-method: katex
    author-meta: "Soichi Matsuura"
    df-print: paged
    page-navigation: true
    back-to-top-navigation: true
    twitter-card: true

    include-in-header:
      text: |
        <style>
        .marky {
          background: linear-gradient(transparent 60%, #FCFFC1 0%);
        }
        .markb {
          background: linear-gradient(transparent 60%, #88E2EA 0%);
        }
        .markp{
          background: linear-gradient(transparent 70%, #ffcdd2 0%)
        }
        </style>
    grid:
      sidebar-width: 200px
      body-width: 1200px

imagify:
  header-includes:
    \usepackage{amsmath,amsfonts}
    \usepackage{tikz}
    \usetikzlibrary{positioning,shapes,arrows,intersections}
    \usetikzlibrary{calc,decorations.markings,through}

lang: "ja"
knitr:
  opts_chunk:
    dev: "ragg_png"
    dpi: 600

execute:
  error: false
  message: false


bibliography: references.bib
